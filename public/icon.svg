<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f39c12"/>
      <stop offset="100%" stop-color="#d35400"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="114" fill="url(#bg)"/>

  <!-- Plate shadow -->
  <circle cx="256" cy="260" r="168" fill="rgba(0,0,0,0.10)"/>

  <!-- Plate -->
  <circle cx="256" cy="256" r="162" fill="rgba(255,255,255,0.15)"/>
  <circle cx="256" cy="256" r="150" fill="white"/>

  <!-- Plate inner rim -->
  <circle cx="256" cy="256" r="114" fill="none" stroke="#e67e22" stroke-width="7" stroke-opacity="0.22"/>

  <!-- Fork (left of plate center) -->
  <!-- Handle -->
  <rect x="151" y="278" width="18" height="108" rx="9" fill="#e67e22"/>
  <!-- Tine 1 -->
  <rect x="140" y="140" width="11" height="82" rx="5.5" fill="#e67e22"/>
  <!-- Tine 2 -->
  <rect x="156" y="140" width="11" height="82" rx="5.5" fill="#e67e22"/>
  <!-- Tine 3 -->
  <rect x="172" y="140" width="11" height="82" rx="5.5" fill="#e67e22"/>
  <!-- Fork neck (tines to handle transition) -->
  <path d="M140 222 Q140 278 151 278 L169 278 Q180 278 183 222 Z" fill="#e67e22"/>

  <!-- Knife (right of plate center) -->
  <!-- Handle -->
  <rect x="343" y="278" width="18" height="108" rx="9" fill="#e67e22"/>
  <!-- Blade (tapered from top, flat spine on left, curved edge on right) -->
  <path d="M343 140 L361 140 L361 260 Q352 278 343 260 Z" fill="#e67e22"/>
  <!-- Blade guard ridge -->
  <rect x="343" y="258" width="18" height="8" rx="3" fill="#c0392b" opacity="0.35"/>
</svg>
